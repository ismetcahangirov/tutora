name: tutora-prod

# Production stack. Images are pulled from the registry by default, or built
# locally with `docker compose -f docker-compose.prod.yml build`. See
# docs/deployment.md for the full runbook.
#
# Required env (via .env — copy from .env.production.example):
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB, JWT secrets, DOMAIN,
#   PUBLIC_API_URL, IMAGE_REGISTRY, IMAGE_TAG.

x-image-registry: &registry ${IMAGE_REGISTRY:-ghcr.io/ismetcahangirov}
x-image-tag: &tag ${IMAGE_TAG:-latest}

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tutora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-tutora}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tutora} -d ${POSTGRES_DB:-tutora}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # One-shot: apply pending Prisma migrations, then exit. The API waits for this
  # to complete successfully before booting, so schema is never behind the code.
  # Reuses the API image; the Prisma CLI is hoisted to the workspace-root bin.
  migrate:
    image: ${IMAGE_REGISTRY:-ghcr.io/ismetcahangirov}/tutora-api:${IMAGE_TAG:-latest}
    restart: 'no'
    command:
      - /app/node_modules/.bin/prisma
      - migrate
      - deploy
      - --schema
      - /app/apps/tutora-api/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tutora}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tutora}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/ismetcahangirov}/tutora-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/tutora-api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tutora}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tutora}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admin:
    image: ${IMAGE_REGISTRY:-ghcr.io/ismetcahangirov}/tutora-admin:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/tutora-admin/Dockerfile
      args:
        # Baked into the bundle at build time.
        VITE_API_URL: ${PUBLIC_API_URL:-https://api.${DOMAIN:-localhost}}
        VITE_SENTRY_DSN: ${ADMIN_SENTRY_DSN:-}
    restart: unless-stopped

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io/ismetcahangirov}/tutora-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/tutora-web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.${DOMAIN:-localhost}}
        NEXT_PUBLIC_SENTRY_DSN: ${WEB_SENTRY_DSN:-}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - api
      - admin
      - web

  # Scheduled database backups → the `backups` volume. Interval and retention
  # are configurable; see docs/backups.md.
  db-backup:
    image: ${IMAGE_REGISTRY:-ghcr.io/ismetcahangirov}/tutora-backup:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/backup/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tutora}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tutora}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  backups:
  certbot-webroot:
