# Edge reverse proxy — main configuration.
# Server blocks live in templates/default.conf.template and are rendered into
# conf.d by the official image's envsubst entrypoint (only ${DOMAIN} is
# substituted; native $variables are preserved).

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    server_tokens off;
    keepalive_timeout 65;
    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_disable "msie6";
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    # Maps the WebSocket Upgrade header so proxied connections (the chat gateway
    # at /socket.io/) keep their upgrade semantics.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Basic abuse protection at the edge. Auth endpoints are additionally
    # throttled inside the API (see the app's rate-limit module).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    include /etc/nginx/conf.d/*.conf;
}
