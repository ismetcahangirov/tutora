name: Deploy

# Build production images and publish them to the GitHub Container Registry.
# The optional deploy job is inert until DEPLOY_ENABLED is set (see below), so
# this workflow is safe to merge before any server exists.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/tutora-api/Dockerfile
          - app: admin
            dockerfile: apps/tutora-admin/Dockerfile
            build_args: |
              VITE_API_URL=${{ vars.PUBLIC_API_URL }}
              VITE_SENTRY_DSN=${{ vars.ADMIN_SENTRY_DSN }}
          - app: web
            dockerfile: apps/tutora-web/Dockerfile
            build_args: |
              NEXT_PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }}
              NEXT_PUBLIC_SENTRY_DSN=${{ vars.WEB_SENTRY_DSN }}
          - app: backup
            dockerfile: docker/backup/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/tutora-${{ matrix.app }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Opt-in remote rollout. Enable by setting the repository variable
  # DEPLOY_ENABLED=true and the secrets DEPLOY_HOST / DEPLOY_USER /
  # DEPLOY_SSH_KEY plus the variable DEPLOY_PATH. Until then it is skipped.
  deploy:
    name: deploy
    needs: build-push
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Roll out over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
             docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans"

  # Render's own GitHub App auto-deploy has proven unreliable for this repo
  # (Auto-Deploy is "On Commit" in its settings, but no deploy has ever fired
  # from a push — every deploy in its history was manual). Rather than debug
  # an opaque third-party webhook, drive it explicitly from the pipeline that
  # already gates on a successful image build: a Render deploy hook is just a
  # POST URL, so hitting it here is the same trigger a working webhook would
  # send, minus the dependency on Render's GitHub integration actually working.
  # Enable by setting the repository variable RENDER_DEPLOY_ENABLED=true and
  # the secret RENDER_DEPLOY_HOOK_URL (Render dashboard → tutora service →
  # Settings → Deploy → Deploy Hook). `if:` can't reference `secrets` directly
  # (GitHub Actions rejects it as an unrecognized named-value there), hence
  # the separate `vars` gate.
  deploy-render-api:
    name: trigger Render deploy (api)
    needs: build-push
    if: ${{ vars.RENDER_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Call the Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
