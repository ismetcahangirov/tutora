# Internal Nginx serving the compiled admin SPA. TLS and host routing are
# handled by the edge proxy (docker/nginx); this server only serves files.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Container-level liveness endpoint (used by HEALTHCHECK and the edge proxy).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Long-cache fingerprinted assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path resolves to the app shell so client-side
    # routing (React Router) can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, or clients pin a stale bundle.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
